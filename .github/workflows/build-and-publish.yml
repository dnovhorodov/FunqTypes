name: Build and Publish to NuGet

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
  pull_request:
    branches:
      - main
  release:
    types: [ created ]

jobs:
  build:
    name: 🏗️ Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 🛎️ Checkout repository
        uses: actions/checkout@v4

      - name: 🏗️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: 🔍 Restore dependencies
        run: dotnet restore

      - name: 🏗️ Build project
        run: dotnet build --configuration Release --no-restore

      - name: 🧪 Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal

  publish:
    name: 🚀 Publish to NuGet
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    
    # CRITICAL: This is what allows GitHub to mint the OIDC token
    permissions:
      id-token: write
      contents: read

    steps:
      - name: 🛎️ Checkout repository
        uses: actions/checkout@v4

      - name: 🏗️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 🔍 Restore dependencies
        run: dotnet restore

      - name: 🔧 Extract version from Git tag
        run: echo "VERSION=$(echo ${GITHUB_REF#refs/tags/v})" >> $GITHUB_ENV

      - name: 📦 Pack FunqTypes
        run: dotnet pack FunqTypes/FunqTypes.csproj --configuration Release -p:Version=${{ env.VERSION }} --output nupkg

      - name: 📦 Pack FunqTypes.AspNetCore
        run: dotnet pack FunqTypes.AspNetCore/FunqTypes.AspNetCore.csproj --configuration Release -p:Version=${{ env.VERSION }} --output nupkg
                  
        # Trades the GitHub OIDC token for a 60-minute NuGet API key
      - name: 🔑 NuGet Login (OIDC)
        uses: NuGet/login@v1
        with:
          user: danyl.novhorodov          
        
      - name: 🚀 Publish all .nupkg to NuGet.org
        run: dotnet nuget push nupkg/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ steps.nuget_login.outputs.NUGET_API_KEY }} --skip-duplicate